<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CashChat — Expense &amp; Income Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#08080d;--surface:#101018;--surface2:#181825;--surface3:#22223a;--border:#2a2a42;--text:#e4e2f0;--text2:#8886a0;--accent:#6c5ce7;--accent2:#a29bfe;--red:#ff6b6b;--green:#51cf66;--bot-bg:#16162a;--yellow:#feca57}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;justify-content:center;overflow:hidden}
  #app{width:100%;max-width:520px;height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg)}
  .overlay{position:absolute;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;animation:fadeIn .3s ease;overflow-y:auto}
  .overlay.hidden{display:none}
  .overlay .logo{font-size:48px;margin-bottom:16px}
  .overlay .title{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;margin-bottom:8px}
  .overlay .desc{color:var(--text2);font-size:14px;text-align:center;line-height:1.6;margin-bottom:24px;max-width:360px}
  .s-input{width:100%;max-width:400px;padding:14px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px}
  .s-input:focus{border-color:var(--accent)}
  .s-input::placeholder{color:var(--text2)}
  .s-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;width:100%;max-width:400px;text-align:left}
  .s-btn{width:100%;max-width:400px;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px}
  .s-btn:active{transform:scale(.97)}

  .header{padding:14px 20px 0;background:linear-gradient(180deg,rgba(108,92,231,.06),transparent)}
  .header-top{display:flex;align-items:center;justify-content:space-between}
  .header h1{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;display:flex;align-items:center;gap:8px}
  .header-balance{text-align:right}
  .header-balance .label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text2)}
  .header-balance .amount{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700}
  .amount.positive{color:var(--green)}.amount.negative{color:var(--red)}
  .tabs{display:flex;gap:4px;margin-top:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .tab-btn{flex:1;padding:9px 0;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text2);transition:all .2s}
  .tab-btn.active{background:var(--accent);color:#fff}
  .content{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
  .content::-webkit-scrollbar{width:4px}
  .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  .empty-state{text-align:center;padding:40px 16px;color:var(--text2)}
  .empty-state .icon{font-size:44px;margin-bottom:14px}
  .empty-state .etitle{font-size:16px;font-weight:600;color:var(--text);margin-bottom:10px}
  .empty-state .hints{font-size:13px;line-height:2;opacity:.7}
  .bubble-row{display:flex;margin-bottom:8px;animation:slideUp .25s ease}
  .bubble-row.user{justify-content:flex-end}
  .bubble-row.bot{justify-content:flex-start}
  .bubble{max-width:78%;padding:10px 16px;font-size:14px;line-height:1.55;word-break:break-word}
  .bubble.user-bubble{background:var(--accent);color:#fff;border-radius:18px 18px 4px 18px}
  .bubble.bot-bubble{background:var(--bot-bg);border:1px solid var(--border);border-radius:18px 18px 18px 4px}
  .bubble .ok{font-weight:600;margin-bottom:5px}
  .bubble .detail-grid{display:grid;grid-template-columns:auto 1fr;gap:2px 12px;font-size:13px}
  .bubble .detail-grid .lbl{opacity:.5}
  .bubble .detail-grid .amt-out{font-weight:700;color:var(--red)}
  .bubble .detail-grid .amt-in{font-weight:700;color:var(--green)}
  .bubble .err-hint{font-size:12px;opacity:.55;margin-top:3px}
  .store-tag{display:inline-block;font-size:11px;background:var(--surface3);color:var(--yellow);padding:2px 8px;border-radius:4px;margin-top:4px}

  .recap-controls{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .pill{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text2);transition:all .2s}
  .pill.active{background:var(--accent);color:#fff}
  .pill.outline{background:transparent;border:1px solid var(--border)}
  .date-filter{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
  .date-filter input[type="date"]{padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color-scheme:dark}
  .date-filter .sep{color:var(--text2);font-size:12px}
  .summary-row{display:flex;gap:8px;margin-bottom:12px}
  .summary-card{flex:1;border-radius:14px;padding:14px;border:1px solid var(--border)}
  .summary-card.income{background:linear-gradient(135deg,rgba(81,207,102,.08),rgba(81,207,102,.02))}
  .summary-card.expense{background:linear-gradient(135deg,rgba(255,107,107,.08),rgba(255,107,107,.02))}
  .summary-card.balance{background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(162,155,254,.05))}
  .summary-card .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
  .summary-card .val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-top:4px}
  .summary-card .val.green{color:var(--green)}.summary-card .val.red{color:var(--red)}
  .summary-card .sub{font-size:11px;color:var(--text2);margin-top:2px}
  .tx-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);animation:slideUp .2s ease}
  .tx-item .emoji{font-size:22px;flex-shrink:0}
  .tx-item .info{flex:1;min-width:0}
  .tx-item .info .desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx-item .info .meta{font-size:11px;color:var(--text2);margin-top:2px}
  .tx-item .price{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;white-space:nowrap}
  .tx-item .price.out{color:var(--red)}.tx-item .price.in{color:var(--green)}
  .tx-item .del-btn{border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:18px;padding:4px;opacity:.4}
  .tx-item .del-btn:hover{opacity:1;color:var(--red)}

  .rec-panel{margin-bottom:16px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
  .rec-panel .rec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--yellow);margin-bottom:10px}
  .rec-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
  .rec-item:last-child{border:none}
  .rec-item .rec-info{flex:1;min-width:0}
  .rec-item .rec-info .rec-desc{font-size:13px;font-weight:500}
  .rec-item .rec-info .rec-meta{font-size:11px;color:var(--text2)}
  .rec-item .rec-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--red)}
  .rec-add{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .rec-add input,.rec-add select{padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
  .rec-add input{flex:1;min-width:100px}
  .rec-add button{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
  .recurring-badge{font-size:10px;background:var(--surface3);color:var(--yellow);padding:2px 6px;border-radius:4px;margin-left:4px}

  .chart-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text2);margin-bottom:14px}
  .bar-row{margin-bottom:12px}
  .bar-row .bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .bar-row .bar-label .val{font-weight:600}
  .bar-track{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
  .bar-fill.out{background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .bar-fill.in{background:linear-gradient(90deg,#20bf6b,#51cf66)}
  .day-chart{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:8px}
  .day-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .day-bar{width:100%;border-radius:4px;transition:height .5s ease}
  .day-bar.out-bar{background:linear-gradient(180deg,var(--accent),var(--accent2))}
  .day-bar.in-bar{background:linear-gradient(180deg,#20bf6b,#51cf66)}
  .day-bar.empty{background:var(--border)}
  .day-label{font-size:10px;color:var(--text2)}

  .input-bar{padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:center}
  .input-bar input{flex:1;padding:13px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
  .input-bar input:focus{border-color:var(--accent)}
  .input-bar input::placeholder{color:var(--text2)}
  .send-btn{width:46px;height:46px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .send-btn:active{transform:scale(.9)}
  .cam-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
  .cam-btn:hover{border-color:var(--accent);background:var(--surface3)}
  .cam-btn.processing{animation:pulse 1s infinite}
  .ocr-preview{margin:8px 0;border-radius:12px;overflow:hidden;max-width:200px}
  .ocr-preview img{width:100%;display:block;border-radius:12px;border:1px solid var(--border)}
  .sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:6px;vertical-align:middle}
  .sync-dot.ok{background:var(--green)}.sync-dot.loading{background:var(--yellow);animation:pulse 1s infinite}.sync-dot.err{background:var(--red)}
  .gear-btn{border:none;background:transparent;color:var(--text2);font-size:18px;cursor:pointer;padding:4px;margin-left:8px}
  .gear-btn:hover{color:var(--text)}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @media(max-width:520px){.header{padding:12px 16px 0}.content{padding:12px}}
</style>
</head>
<body>
<div id="app">
  <!-- Settings overlay (hidden by default) -->
  <div class="overlay hidden" id="setupScreen">
    <div class="logo">⚙️</div>
    <div class="title">Settings</div>
    <div class="desc">Ubah konfigurasi CashChat</div>
    <div class="s-label">Google Apps Script URL</div>
    <input class="s-input" id="setupUrl" spellcheck="false">
    <div class="s-label">Gemini API Key (untuk OCR)</div>
    <input class="s-input" id="setupGemini" spellcheck="false">
    <button class="s-btn" onclick="saveSetup()">💾 Simpan</button>
    <button class="s-btn" style="background:var(--surface2);color:var(--text2);margin-top:8px" onclick="closeSetup()">← Kembali</button>
  </div>

  <div class="header" id="mainHeader">
    <div class="header-top">
      <h1>💸 CashChat <span class="sync-dot ok" id="syncDot"></span></h1>
      <div style="display:flex;align-items:center">
        <div class="header-balance"><div class="label">Saldo</div><div class="amount" id="balanceAmount">Rp0</div></div>
        <button class="gear-btn" onclick="showSetup()" title="Settings">⚙</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('chat',this)">💬 Chat</button>
      <button class="tab-btn" onclick="switchTab('recap',this)">📊 Rekap</button>
      <button class="tab-btn" onclick="switchTab('chart',this)">📈 Chart</button>
      <button class="tab-btn" onclick="switchTab('recurring',this)">🔄 Rutin</button>
    </div>
  </div>

  <div class="content" id="content">
    <div id="chatView"></div>
    <div id="recapView" style="display:none"></div>
    <div id="chartView" style="display:none"></div>
    <div id="recurringView" style="display:none"></div>
  </div>

  <div class="input-bar" id="inputBar">
    <input type="file" id="receiptInput" accept="image/*" capture="environment" style="display:none" onchange="handleReceipt(this)">
    <button class="cam-btn" onclick="document.getElementById('receiptInput').click()" title="Scan struk">📷</button>
    <input id="msgInput" placeholder='e.g. "makan 35rb" atau "gaji 5jt"' autocomplete="off">
    <button class="send-btn" onclick="handleSend()">↑</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG — hardcoded defaults, editable via settings
// ═══════════════════════════════════════════════
const DEFAULT_API='https://script.google.com/macros/s/AKfycbzWUKnI6M9Mdbhx58Z0OSv0t667Z66LITf6egx8ln7pgtlIg3xmFTlTxHUXc35jt9AB1A/exec';

let API_URL=localStorage.getItem('cashchat_api')||DEFAULT_API;
let GEMINI_KEY=localStorage.getItem('cashchat_gemini')||'';
let entries=[];
let messages=JSON.parse(localStorage.getItem('cashchat_msgs')||'[]');
let recurring=JSON.parse(localStorage.getItem('cashchat_rec')||'[]');

// ═══════════════════════════════════════════════
// STORES / PLACES
// ═══════════════════════════════════════════════
const KNOWN_STORES={
  "Alfamart":["alfamart","alfa"],
  "Indomaret":["indomaret","indomart"],
  "Lotte Mart":["lotte mart","lotte","lottemart"],
  "Family Mart":["family mart","familymart","famima"],
  "Lawson":["lawson"],
  "Circle K":["circle k","cirk"],
  "Super Indo":["super indo","superindo"],
  "Hypermart":["hypermart"],
  "Giant":["giant"],
  "Transmart":["transmart","carrefour"],
  "Ranch Market":["ranch market"],
  "Farmers Market":["farmers market"],
  "Food Hall":["food hall","foodhall"],
  "Starbucks":["starbucks","sbux"],
  "Kopi Kenangan":["kenangan","kopi kenangan"],
  "Janji Jiwa":["janji jiwa"],
  "Fore Coffee":["fore coffee","fore"],
  "Tomoro":["tomoro"],
  "Mixue":["mixue"],
  "Chatime":["chatime"],
  "McDonald's":["mcd","mcdonalds","mcdonald"],
  "KFC":["kfc"],
  "Burger King":["burger king","bk"],
  "Pizza Hut":["pizza hut"],
  "Hokben":["hokben","hoka hoka"],
  "Yoshinoya":["yoshinoya"],
  "Solaria":["solaria"],
  "J.CO":["jco","j.co"],
  "Breadtalk":["breadtalk","bread talk"],
  "CGV":["cgv"],
  "XXI":["xxi","cinema xxi"],
  "Tokopedia":["tokped","tokopedia"],
  "Shopee":["shopee"],
  "Lazada":["lazada"],
  "Blibli":["blibli"],
  "Grab":["grab","grabfood","grabbike","grabcar"],
  "Gojek":["gojek","gofood","goride","gocar"],
};

function detectStore(text){
  const lower=text.toLowerCase();
  for(const[store,kws]of Object.entries(KNOWN_STORES)){
    if(kws.some(k=>lower.includes(k)))return store;
  }
  return '';
}

// ═══════════════════════════════════════════════
// CATEGORIES
// ═══════════════════════════════════════════════
const EXP_CATEGORIES={
  "🍔 Makan":["makan","lunch","dinner","breakfast","sarapan","nasi","ayam","sate","bakso","mie","burger","pizza","sushi","ramen","warteg","padang","resto","restaurant","food","snack","jajan","indomie","geprek","pecel","gado","soto","rawon","rendang","martabak","gorengan","seblak","batagor","siomay","nasi goreng","nasi padang","nasi uduk","ketoprak","bubur","lontong","pempek","dimsum","steak","salad","ricebowl","lauk","sayur","catering","mcd","kfc","hokben","solaria","yoshinoya","pizza hut","burger king"],
  "☕ Ngopi & Minum":["kopi","coffee","starbucks","boba","teh","tea","minum","drink","jus","juice","es","susu","milk","chatime","kenangan","janji jiwa","fore","tomoro","mixue","koi","gulu","xiboba","yakult","jco","j.co"],
  "🍞 Roti & Snack":["roti","bread","bakery","kue","cake","donat","croissant","pastry","cookies","keripik","coklat","chocolate","permen","ice cream","es krim","breadtalk"],
  "🛒 Groceries":["supermarket","super indo","hypermart","giant","alfamart","indomaret","lotte mart","lotte","family mart","familymart","lawson","circle k","groceries","belanja bulanan","sayuran","buah","daging","bumbu","beras","minyak","telur","ranch market","farmers market","transmart","food hall"],
  "🚗 Transport":["grab","gojek","ojek","taxi","taksi","uber","bensin","parkir","tol","transport","bus","kereta","mrt","lrt","krl","transjakarta","angkot","ojol","maxim","indriver","solar","pertalite","pertamax","shell","bbm","e-toll","etoll","flazz"],
  "🛍️ Belanja":["beli","belanja","shopping","baju","celana","sepatu","tas","tokped","tokopedia","shopee","lazada","blibli","mall","tiktok shop","fashion","kaos","jaket","hoodie","aksesoris"],
  "🏠 Rumah & Tagihan":["listrik","air","pam","wifi","internet","pulsa","paket data","iuran","sewa","rent","kost","kos","kontrakan","bill","tagihan","indihome","telkomsel","xl","tri","smartfren","pln","bpjs","asuransi","cicilan","kredit","angsuran","pajak","ipkl","gas","elpiji","laundry","cuci","service ac","sampah","kebersihan"],
  "🎮 Hiburan":["game","netflix","spotify","youtube","nonton","bioskop","cinema","tiket","konser","hiburan","disney","hbo","steam","topup","cgv","xxi","prime video","viu"],
  "⚽ Olahraga":["futsal","gym","fitness","badminton","bulutangkis","renang","swimming","tennis","basket","sepak bola","yoga","pilates","golf","boxing","muay thai","member gym","membership"],
  "💊 Kesehatan":["obat","dokter","apotek","farmasi","rumah sakit","rs","klinik","vitamin","health","medical","checkup","lab","fisioterapi","psikolog","gigi","dentist","mata","optik","kacamata"],
  "📚 Pendidikan":["buku","book","kursus","course","les","tutor","sekolah","kuliah","spp","ukt","udemy","coursera","seminar","workshop","training","sertifikasi"],
  "🧴 Self Care":["skincare","makeup","salon","barbershop","barber","potong rambut","cukur","spa","pijat","massage","facial","manicure","parfum","sabun","shampoo","perawatan"],
  "🐱 Pet":["kucing","anjing","pet","pet shop","petshop","makanan kucing","makanan anjing","grooming","vaksin hewan","vet","dokter hewan","pasir kucing"],
  "🪡 Jahit & Service":["jahit","tailor","permak","service","servis","reparasi","repair","ganti oli","tune up","tambal ban","cuci mobil","cuci motor","poles"],
  "🎁 Gift & Donasi":["kado","gift","hadiah","sumbangan","donasi","infaq","infak","sedekah","zakat","amal","charity","angpao"],
  "📦 Lainnya":[]
};
const INC_CATEGORIES={
  "💰 Gaji":["gaji","salary","payroll","gajian","upah"],
  "💵 Bonus & Komisi":["komisi","commission","bonus","insentif","incentive","thr","lembur","overtime"],
  "💼 Freelance":["freelance","project","proyek","jasa","fee","honor","honorarium","client","klien"],
  "🏪 Jualan":["jualan","jual","profit","laba","untung","omset","penjualan","dagang","usaha"],
  "🎁 Transfer Masuk":["transfer","kirim","terima","tf","kiriman"],
  "📈 Investasi":["dividen","dividend","bunga","interest","investasi","saham","crypto","return","reksadana","deposito","yield"],
  "💳 Cashback & Refund":["refund","cashback","rebate","voucher","reward","poin","point"],
  "💚 Income Lain":[]
};
const INCOME_WORDS=["gaji","gajian","salary","payroll","upah","komisi","commission","bonus","thr","lembur","overtime","freelance","honor","honorarium","dividen","dividend","bunga deposito","cashback","refund","income","pemasukan","insentif","terima transfer","transfer masuk","profit","laba","untung"];
const EXPENSE_WORDS=["beli","bayar","bayarin","traktir","ongkir","ongkos","biaya","harga","buat","untuk"];

function categorize(text,type){const lower=text.toLowerCase();const cats=type==='income'?INC_CATEGORIES:EXP_CATEGORIES;for(const[cat,kws]of Object.entries(cats)){if(kws.some(k=>lower.includes(k)))return cat;}return type==='income'?"💚 Income Lain":"📦 Lainnya";}

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
// ABBREVIATION EXPANSION
// ═══════════════════════════════════════════════
const ABBREVIATIONS={
  'mkn':'makan','mjn':'makan','mkan':'makan',
  'mlm':'malam','sng':'siang','sor':'sore',
  'lnch':'lunch','dnr':'dinner','brkfst':'sarapan',
  'ojl':'ojol','grb':'grab','gjk':'gojek',
  'blnj':'belanja','blnja':'belanja','blj':'beli',
  'dgn':'dengan','utk':'untuk','dg':'dengan',
  'krn':'karena','tdk':'tidak','udh':'sudah','sdh':'sudah',
};

function expandAbbreviations(text){
  const corrections=[];
  const expanded=text.split(/\s+/).map(word=>{
    const lower=word.toLowerCase();
    if(ABBREVIATIONS[lower]){
      const replacement=ABBREVIATIONS[lower];
      if(replacement!==lower) corrections.push({from:word,to:replacement});
      return replacement;
    }
    return word;
  }).join(' ');
  return{text:expanded,corrections};
}

// TYPO CORRECTION (Levenshtein fuzzy match)
// ═══════════════════════════════════════════════
function levenshtein(a,b){
  const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>i);
  for(let j=1;j<=n;j++){let prev=d[0];d[0]=j;
    for(let i=1;i<=m;i++){const t=d[i];d[i]=a[i-1]===b[j-1]?prev:1+Math.min(prev,d[i],d[i-1]);prev=t;}}
  return d[m];
}

// Build word dictionary from all categories + stores + income/expense words
const ALL_KNOWN_WORDS=(function(){
  const words=new Set();
  [EXP_CATEGORIES,INC_CATEGORIES].forEach(cats=>{Object.values(cats).forEach(kws=>{kws.forEach(k=>{k.split(' ').forEach(w=>{if(w.length>=3)words.add(w.toLowerCase())});if(k.includes(' '))words.add(k.toLowerCase());});});});
  Object.keys(KNOWN_STORES).forEach(s=>words.add(s.toLowerCase()));
  Object.values(KNOWN_STORES).forEach(kws=>kws.forEach(k=>{if(k.length>=3)words.add(k.toLowerCase())}));
  INCOME_WORDS.forEach(w=>words.add(w.toLowerCase()));
  EXPENSE_WORDS.forEach(w=>words.add(w.toLowerCase()));
  return[...words];
})();

function correctTypos(text){
  const words=text.split(/\s+/);
  const corrections=[];
  const corrected=words.map(word=>{
    const lower=word.toLowerCase();
    // Skip numbers, short words, and words that already match
    if(word.match(/\d/)||lower.length<3)return word;
    if(ALL_KNOWN_WORDS.includes(lower))return word;
    // Find closest match
    let bestMatch=null,bestDist=Infinity;
    for(const known of ALL_KNOWN_WORDS){
      if(Math.abs(known.length-lower.length)>2)continue; // skip if length differs too much
      const dist=levenshtein(lower,known);
      const threshold=lower.length<=4?1:2; // stricter for short words
      if(dist<=threshold&&dist<bestDist){bestDist=dist;bestMatch=known;}
    }
    if(bestMatch&&bestMatch!==lower){
      // Preserve original casing style
      const fixed=word[0]===word[0].toUpperCase()?bestMatch[0].toUpperCase()+bestMatch.slice(1):bestMatch;
      corrections.push({from:word,to:fixed});
      return fixed;
    }
    return word;
  });
  return{text:corrected.join(' '),corrections};
}
function parseAmount(text){const lower=text.toLowerCase().replace(/\./g,'').replace(/,/g,'');const pats=[{r:/(\d+(?:[.,]\d+)?)\s*jt/i,m:1e6},{r:/(\d+(?:[.,]\d+)?)\s*juta/i,m:1e6},{r:/(\d+(?:[.,]\d+)?)\s*rb/i,m:1e3},{r:/(\d+(?:[.,]\d+)?)\s*ribu/i,m:1e3},{r:/(\d+(?:[.,]\d+)?)\s*k\b/i,m:1e3},{r:/rp\s*(\d+)/i,m:1},{r:/(\d{4,})/,m:1}];for(const{r,m}of pats){const match=lower.match(r);if(match)return Math.round(parseFloat(match[1].replace(',','.'))*m);}return null;}

function parseMessage(text){
  // Step 1: Expand known abbreviations (mjn→makan, mlm→malam, etc.)
  const {text:expandedText, corrections:abbrevCorrections} = expandAbbreviations(text);
  // Step 2: Auto-correct remaining typos with Levenshtein
  const {text:correctedText, corrections:typoCorrections} = correctTypos(expandedText);
  const allCorrections=[...abbrevCorrections,...typoCorrections];
  const workText = allCorrections.length > 0 ? correctedText : text;

  const lower=workText.toLowerCase();
  const hasPlus=text.startsWith('+'),hasMinus=text.startsWith('-');
  const hasExpW=EXPENSE_WORDS.some(k=>lower.includes(k));
  const hasIncW=INCOME_WORDS.some(k=>lower.includes(k));
  let isIncome;
  if(hasPlus)isIncome=true;else if(hasMinus)isIncome=false;
  else if(hasExpW&&!hasIncW)isIncome=false;else if(hasIncW&&!hasExpW)isIncome=true;else isIncome=false;
  const clean=(hasPlus||hasMinus)?workText.slice(1).trim():workText;
  const amount=parseAmount(clean);if(!amount)return null;
  const type=isIncome?'income':'expense';

  // Extract store from prepositions: "di/du/at [place name]"
  let store=detectStore(clean);
  let descText=clean;

  // Pattern: "makan mlm di/du/at nama tempat 35rb"
  const placeMatch=clean.match(/\b(?:di|du|d\/|at|ke)\s+(.+?)(?:\s+\d|\s*$)/i);
  if(placeMatch && !store){
    const placeName=placeMatch[1].replace(/\d+.*$/,'').replace(/\s*(rb|ribu|jt|juta|k)\b.*$/i,'').trim();
    if(placeName.length>=2){
      store=placeName;
      // Remove the "di [place]" part from description
      descText=clean.replace(/\b(?:di|du|d\/|at|ke)\s+.+?(?=\s+\d|\s*$)/i,'').trim();
    }
  }

  const category=categorize(descText,type);

  let desc=descText.replace(/rp\s*\d+/gi,'').replace(/\d+(?:[.,]\d+)?\s*(jt|juta|rb|ribu|k)\b/gi,'').replace(/\d{4,}/g,'').replace(/\s+/g,' ').trim();
  // Clean up common abbreviations
  desc=desc.replace(/\bmlm\b/gi,'malam').replace(/\bpg\b/gi,'pagi').replace(/\bsng\b/gi,'siang').replace(/\bsor\b/gi,'sore');
  if(!desc)desc=category.split(' ').slice(1).join(' ');

  return{id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),amount,category,description:desc,type,store,date:new Date().toISOString(),corrections:allCorrections.length>0?allCorrections:null};
}
function fmtRp(n){return'Rp'+Math.abs(n).toLocaleString('id-ID')}
function fmtDate(iso){return new Date(iso).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}
function fmtTime(iso){return new Date(iso).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}

function setSyncStatus(s){document.getElementById('syncDot').className='sync-dot '+s}
function gasCall(params){return new Promise((resolve,reject)=>{const cb='_cb_'+Date.now()+Math.random().toString(36).slice(2,6);const qs=new URLSearchParams(params);qs.set('callback',cb);window[cb]=function(d){resolve(d);delete window[cb];sc.remove()};const sc=document.createElement('script');sc.src=API_URL+'?'+qs.toString();sc.onerror=function(){reject(new Error('fail'));delete window[cb];sc.remove()};document.head.appendChild(sc);});}
async function fetchEntries(){if(!API_URL)return;setSyncStatus('loading');try{const d=await gasCall({action:'get'});entries=(Array.isArray(d)?d:[]).map(e=>({...e,amount:Number(e.amount)}));setSyncStatus('ok');updateUI();}catch(e){console.error(e);setSyncStatus('err')}}
async function addEntry(entry){entries.push(entry);updateUI();if(!API_URL)return;setSyncStatus('loading');try{await gasCall({action:'add',id:String(entry.id),date:String(entry.date),description:String(entry.description),category:String(entry.category),amount:String(entry.amount),type:String(entry.type),store:String(entry.store||'')});setSyncStatus('ok');}catch(e){console.error(e);setSyncStatus('err')}}
async function deleteEntry(id){entries=entries.filter(e=>e.id!==id);updateUI();if(!API_URL)return;setSyncStatus('loading');try{await gasCall({action:'delete',id:String(id)});setTimeout(()=>fetchEntries(),1500);}catch(e){console.error(e);setSyncStatus('err')}}

function checkRecurring(){const today=new Date();const day=today.getDate();const mk=today.toISOString().slice(0,7);recurring.forEach(r=>{if(r.day===day&&r.lastRun!==mk){const entry={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),amount:r.amount,category:r.category,description:r.description,type:r.type||'expense',store:r.store||'',date:today.toISOString()};addEntry(entry);messages.push({type:'user',text:`🔄 Auto: ${r.description} ${fmtRp(r.amount)}`,ts:Date.now()},{type:'bot',parsed:entry,ts:Date.now()+1});localStorage.setItem('cashchat_msgs',JSON.stringify(messages));r.lastRun=mk;saveRecurring();}});}

    else if(m.parsed){const isIn=m.parsed.type==='income';const st=m.parsed.store;const corr=m.parsed.corrections;
      let corrHtml='';if(corr&&corr.length>0){corrHtml=`<div style="font-size:11px;color:var(--yellow);margin-top:4px;opacity:.8">✏️ Koreksi: ${corr.map(c=>`<s style="opacity:.5">${esc(c.from)}</s> → ${esc(c.to)}`).join(', ')}</div>`;}

    else{html+=`<div class="bubble-row bot"><div class="bubble bot-bubble"><div>🤔 Ga bisa baca jumlahnya.</div><div class="err-hint">Format: "makan 35rb" atau "gaji 5jt"</div></div></div>`;}
  });
  c.innerHTML=html;c.parentElement.scrollTop=c.parentElement.scrollHeight;
}

function getFilteredEntries(){let f=entries;if(recapPeriod==='daily'){const t=new Date().toISOString().slice(0,10);f=entries.filter(e=>e.date.slice(0,10)===t);}else if(recapPeriod==='monthly'){const m=new Date().toISOString().slice(0,7);f=entries.filter(e=>e.date.slice(0,7)===m);}else if(recapPeriod==='custom'){if(filterFrom)f=f.filter(e=>e.date.slice(0,10)>=filterFrom);if(filterTo)f=f.filter(e=>e.date.slice(0,10)<=filterTo);}return f;}

function renderRecap(){
  const filtered=getFilteredEntries();const{inc,exp,bal}=getBalance(filtered);const pL=recapPeriod==='daily'?'Hari Ini':recapPeriod==='monthly'?'Bulan Ini':'Custom';
  let html=`<div class="recap-controls"><button class="pill ${recapPeriod==='daily'?'active':''}" onclick="setRecapPeriod('daily')">Hari Ini</button><button class="pill ${recapPeriod==='monthly'?'active':''}" onclick="setRecapPeriod('monthly')">Bulan Ini</button><button class="pill ${recapPeriod==='custom'?'active':''}" onclick="setRecapPeriod('custom')">📅 Custom</button><button class="pill outline" onclick="exportCSV()">📥 Export</button></div>`;
  if(recapPeriod==='custom')html+=`<div class="date-filter"><input type="date" id="dateFrom" value="${filterFrom}" onchange="filterFrom=this.value;renderRecap()"><span class="sep">→</span><input type="date" id="dateTo" value="${filterTo}" onchange="filterTo=this.value;renderRecap()"></div>`;
  html+=`<div class="summary-row"><div class="summary-card income"><div class="lbl">Masuk</div><div class="val green">+${fmtRp(inc)}</div></div><div class="summary-card expense"><div class="lbl">Keluar</div><div class="val red">−${fmtRp(exp)}</div></div></div><div class="summary-row"><div class="summary-card balance"><div class="lbl">Saldo ${pL}</div><div class="val ${bal>=0?'green':'red'}">${bal>=0?'+':'−'}${fmtRp(Math.abs(bal))}</div><div class="sub">${filtered.length} transaksi</div></div></div>`;

  else{[...filtered].reverse().forEach(e=>{const isIn=e.type==='income';const st=e.store?` · 🏪 ${e.store}`:'';
    html+=`<div class="tx-item"><div class="emoji">${e.category.split(' ')[0]}</div><div class="info"><div class="desc">${esc(e.description)}</div><div class="meta">${fmtDate(e.date)} · ${fmtTime(e.date)}${st}</div></div><div class="price ${isIn?'in':'out'}">${isIn?'+':'−'}${fmtRp(e.amount)}</div><button class="del-btn" onclick="deleteEntry('${e.id}')" title="Hapus">×</button></div>`;});}
  document.getElementById('recapView').innerHTML=html;
}

  const byCat={};entries.filter(e=>e.type!=='income').forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount});const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);const max=sorted[0]?sorted[0][1]:1;

  const today=new Date();const days=[];for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const key=d.toISOString().slice(0,10);const de=entries.filter(e=>e.date.slice(0,10)===key);const out=de.filter(e=>e.type!=='income').reduce((s,e)=>s+e.amount,0);const inc2=de.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);days.push({label:d.toLocaleDateString('id-ID',{weekday:'short'}),out,inc:inc2});}

  html+=`</div><div style="display:flex;gap:16px;margin-top:8px;justify-content:center"><span style="font-size:10px;color:var(--text2)">🟢 Masuk</span><span style="font-size:10px;color:var(--text2)">🟣 Keluar</span></div>`;

function handleSend(){const input=document.getElementById('msgInput');const text=input.value.trim();if(!text)return;input.value='';if(text.toLowerCase()==='/reset'){messages=[];entries=[];localStorage.setItem('cashchat_msgs','[]');updateUI();return;}if(text.toLowerCase()==='/sync'){fetchEntries();return;}const parsed=parseMessage(text);messages.push({type:'user',text,ts:Date.now()},{type:'bot',parsed,ts:Date.now()+1});localStorage.setItem('cashchat_msgs',JSON.stringify(messages));if(parsed)addEntry(parsed);else updateUI();}

function exportCSV(){const filtered=getFilteredEntries();let csv='Date,Time,Type,Description,Category,Store,Amount\n';filtered.forEach(e=>{csv+=`${fmtDate(e.date)},${fmtTime(e.date)},${e.type||'expense'},"${e.description}",${e.category},"${e.store||''}",${e.type==='income'?'':'-'}${e.amount}\n`;});const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`cashchat-${new Date().toISOString().slice(0,10)}.csv`;a.click();}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ═══════════════════════════════════════════════
// OCR (GEMINI)
// ═══════════════════════════════════════════════
async function handleReceipt(fileInput){
  const file=fileInput.files[0];if(!file)return;fileInput.value='';
  if(!GEMINI_KEY){
    const key=prompt('Masukkan Gemini API Key untuk scan struk:\n(Gratis dari aistudio.google.com → Get API Key)');
    if(!key){fileInput.value='';return;}
    GEMINI_KEY=key;localStorage.setItem('cashchat_gemini',key);
  }
  const camBtn=document.querySelector('.cam-btn');camBtn.classList.add('processing');camBtn.textContent='⏳';
  const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Read failed'));r.readAsDataURL(file);});
  const thumbUrl=URL.createObjectURL(file);
  messages.push({type:'user',text:'📷 Scan struk...',ts:Date.now(),thumb:thumbUrl});localStorage.setItem('cashchat_msgs',JSON.stringify(messages));updateUI();
  try{
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:`Kamu adalah OCR struk belanja. Baca struk ini dan extract info.

OUTPUT HANYA JSON, tanpa markdown, tanpa backtick:
{"store":"nama toko/resto","items":[{"item":"nama item","amount":harga_final}]}

RULES PENTING:
- "store": nama toko/merchant dari header struk. Kalau ga ada tulis ""
- "items": array semua individual items yang DIBELI
- "amount" = harga FINAL per item dalam Rupiah (angka bulat)
- Kalau ada diskon per item, kurangi dari harga item itu
- Kalau ada diskon global (misal 50%), apply ke setiap item secara proporsional
- JANGAN masukkan subtotal, total, tax, pajak, service charge, kembalian, pembulatan
- Kalau quantity > 1, hitung: (harga satuan x qty) - diskon item
- Kalau ga terbaca, return {"store":"","items":[]}`},{inline_data:{mime_type:file.type||'image/jpeg',data:base64}}]}]})});
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.error?.message||'API error '+resp.status);
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!text)throw new Error('Ga ada response dari Gemini');
    const jsonStr=text.replace(/```json?\s*/g,'').replace(/```/g,'').trim();
    const result=JSON.parse(jsonStr);
    const storeName=result.store||'';
    const items=result.items||[];
    if(items.length===0){messages.push({type:'bot',parsed:null,ts:Date.now(),ocrError:'Ga bisa baca struk. Coba foto lebih jelas.'});localStorage.setItem('cashchat_msgs',JSON.stringify(messages));updateUI();}
    else{
      let totalAdded=0;
      for(const item of items){if(!item.item||!item.amount||item.amount<=0)continue;
        const entry={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),amount:Math.round(item.amount),category:categorize(item.item,'expense'),description:item.item,type:'expense',store:storeName||detectStore(item.item),date:new Date().toISOString()};
        await addEntry(entry);totalAdded++;}
      const totalAmount=items.reduce((s,i)=>s+(i.amount||0),0);
      messages.push({type:'bot',parsed:{description:`${totalAdded} item dari struk`,amount:totalAmount,category:'🧾 Scan Struk',type:'expense',store:storeName,date:new Date().toISOString(),ocrItems:items},ts:Date.now(),isOcr:true});
      localStorage.setItem('cashchat_msgs',JSON.stringify(messages));updateUI();}
  }catch(err){console.error('OCR error:',err);messages.push({type:'bot',parsed:null,ts:Date.now(),ocrError:'Error: '+(err.message||'Gagal proses struk')});localStorage.setItem('cashchat_msgs',JSON.stringify(messages));updateUI();}
  finally{camBtn.classList.remove('processing');camBtn.textContent='📷';}
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleSend()});
fetchEntries();renderChat();checkRecurring();
</script>
