<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CashChat — Expense &amp; Income Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080d;--surface:#101018;--surface2:#181825;--surface3:#22223a;--border:#2a2a42;--text:#e4e2f0;--text2:#8886a0;--accent:#6c5ce7;--accent2:#a29bfe;--red:#ff6b6b;--green:#51cf66;--bot-bg:#16162a;--yellow:#feca57}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;justify-content:center;overflow:hidden}
#app{width:100%;max-width:520px;height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg)}
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;padding:32px;text-align:center}
.auth-screen .logo{font-size:56px;margin-bottom:12px}
.auth-screen h1{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;margin-bottom:8px}
.auth-screen .sub{color:var(--text2);font-size:14px;margin-bottom:32px}
.auth-btn{width:100%;max-width:360px;padding:14px 20px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;font-family:'DM Sans',sans-serif}
.auth-btn:hover{border-color:var(--accent)}
.auth-btn.google{background:#fff;color:#333;border-color:#ddd}
.auth-divider{position:relative;width:100%;max-width:360px;margin:20px 0;border-top:1px solid var(--border)}
.auth-divider span{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--bg);padding:0 12px;color:var(--text2);font-size:13px}
.auth-input{width:100%;max-width:360px;padding:14px 18px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--text2)}
.auth-submit{width:100%;max-width:360px;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.auth-toggle{color:var(--text2);font-size:13px;margin-top:20px}
.auth-toggle button{background:none;border:none;color:var(--accent2);cursor:pointer;font-weight:600;font-size:13px;margin-left:4px;font-family:'DM Sans',sans-serif}
.auth-error{color:var(--red);font-size:13px;margin-bottom:10px;max-width:360px}
.overlay{position:absolute;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;overflow-y:auto}
.overlay.hidden{display:none}
.s-input{width:100%;max-width:400px;padding:14px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px}
.s-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;width:100%;max-width:400px;text-align:left}
.s-btn{width:100%;max-width:400px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px}
.header{padding:14px 20px 0;background:linear-gradient(180deg,rgba(108,92,231,.06),transparent)}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;display:flex;align-items:center;gap:8px}
.header-balance{text-align:right}
.header-balance .label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text2)}
.header-balance .amount{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700}
.amount.pos{color:var(--green)}.amount.neg{color:var(--red)}
.user-info{font-size:11px;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.tabs{display:flex;gap:4px;margin-top:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.tab-btn{flex:1;padding:9px 0;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text2)}
.tab-btn.active{background:var(--accent);color:#fff}
.hdr-btn{border:none;background:transparent;color:var(--text2);font-size:16px;cursor:pointer;padding:4px}
.hdr-btn:hover{color:var(--text)}
.content{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.empty-state{text-align:center;padding:40px 16px;color:var(--text2)}
.empty-state .icon{font-size:44px;margin-bottom:14px}
.empty-state .etitle{font-size:16px;font-weight:600;color:var(--text);margin-bottom:10px}
.empty-state .hints{font-size:13px;line-height:2;opacity:.7}
.bubble-row{display:flex;margin-bottom:8px}
.bubble-row.user{justify-content:flex-end}.bubble-row.bot{justify-content:flex-start}
.bubble{max-width:78%;padding:10px 16px;font-size:14px;line-height:1.55;word-break:break-word}
.bubble.ub{background:var(--accent);color:#fff;border-radius:18px 18px 4px 18px}
.bubble.bb{background:var(--bot-bg);border:1px solid var(--border);border-radius:18px 18px 18px 4px}
.bubble .ok{font-weight:600;margin-bottom:5px}
.dg{display:grid;grid-template-columns:auto 1fr;gap:2px 12px;font-size:13px}
.dg .lbl{opacity:.5}
.amt-out{font-weight:700;color:var(--red)}.amt-in{font-weight:700;color:var(--green)}
.store-tag{display:inline-block;font-size:11px;background:var(--surface3);color:var(--yellow);padding:2px 8px;border-radius:4px;margin-top:4px}
.recap-controls{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text2)}
.pill.active{background:var(--accent);color:#fff}
.pill.outline{background:transparent;border:1px solid var(--border)}
.date-filter{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.date-filter input[type="date"]{padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color-scheme:dark}
.summary-row{display:flex;gap:8px;margin-bottom:12px}
.scard{flex:1;border-radius:14px;padding:14px;border:1px solid var(--border)}
.scard .sl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
.scard .sv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-top:4px}
.scard .ss{font-size:11px;color:var(--text2);margin-top:2px}
.tx-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.tx-item .info{flex:1;min-width:0}
.tx-item .desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-item .meta{font-size:11px;color:var(--text2);margin-top:2px}
.tx-item .price{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;white-space:nowrap}
.del-btn{border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:18px;padding:4px;opacity:.4}
.del-btn:hover{opacity:1;color:var(--red)}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text2);margin-bottom:14px}
.bar-row{margin-bottom:12px}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-label .val{font-weight:600}
.bar-track{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.bar-fill.out{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.bar-fill.in{background:linear-gradient(90deg,#20bf6b,#51cf66)}
.rec-panel{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px}
.rec-panel .rec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--yellow);margin-bottom:10px}
.rec-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.rec-item:last-child{border:none}
.rec-item .rec-info{flex:1;min-width:0}
.rec-item .rec-desc{font-size:13px;font-weight:500}
.rec-item .rec-meta{font-size:11px;color:var(--text2)}
.rec-item .rec-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.recurring-badge{font-size:10px;background:var(--surface3);color:var(--yellow);padding:2px 6px;border-radius:4px;margin-left:4px}
.rec-add{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.rec-add input,.rec-add select{padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.rec-add input{flex:1;min-width:100px}
.rec-add input::placeholder{color:var(--text2)}
.rec-add select{color-scheme:dark}
.rec-add button{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.input-bar{padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:center}
.input-bar input[type="text"]{flex:1;padding:13px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.input-bar input[type="text"]:focus{border-color:var(--accent)}
.input-bar input::placeholder{color:var(--text2)}
.send-btn{width:46px;height:46px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:active{transform:scale(.9)}
.cam-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cam-btn:hover{border-color:var(--accent)}
.cam-btn.processing{animation:pulse 1s infinite}
.loading-screen{display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:12px}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen" id="loadingScreen"><div style="font-size:48px">💸</div><div style="color:var(--text2)">Loading...</div></div>
  <div class="auth-screen" id="authScreen" style="display:none">
    <div class="logo">💸</div>
    <h1>CashChat</h1>
    <p class="sub">Catat pengeluaran &amp; pemasukan lewat chat</p>
    <button class="auth-btn google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Login dengan Google
    </button>
    <div class="auth-divider"><span>atau</span></div>
    <div id="authError" class="auth-error" style="display:none"></div>
    <input class="auth-input" id="authEmail" type="email" placeholder="Email">
    <input class="auth-input" id="authPass" type="password" placeholder="Password">
    <button class="auth-submit" id="authSubmit">Login</button>
    <p class="auth-toggle"><span id="authToggleText">Belum punya akun?</span><button id="authToggleBtn">Daftar</button></p>
  </div>
  <div class="overlay hidden" id="settingsScreen">
    <div style="font-size:48px;margin-bottom:16px">⚙️</div>
    <h2 style="font-family:'JetBrains Mono',monospace;margin-bottom:24px">Settings</h2>
    <div class="s-label">Gemini API Key (untuk OCR struk)</div>
    <input class="s-input" id="setGemini" placeholder="AIzaSy...">
    <button class="s-btn" style="background:var(--accent);color:#fff" onclick="saveSettings()">💾 Simpan</button>
    <button class="s-btn" style="background:var(--surface2);color:var(--text2)" onclick="closeSettings()">← Kembali</button>
  </div>
  <div id="mainApp" style="display:none">
    <div class="header">
      <div class="header-top">
        <div><h1>💸 CashChat</h1><div class="user-info" id="userName"></div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="header-balance"><div class="label">Saldo</div><div class="amount" id="balAmt">Rp0</div></div>
          <div style="display:flex;gap:4px"><button class="hdr-btn" onclick="openSettings()">⚙</button><button class="hdr-btn" onclick="doLogout()">🚪</button></div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('chat',this)">💬 Chat</button>
        <button class="tab-btn" onclick="switchTab('recap',this)">📊 Rekap</button>
        <button class="tab-btn" onclick="switchTab('chart',this)">📈 Chart</button>
        <button class="tab-btn" onclick="switchTab('recurring',this)">🔄 Rutin</button>
      </div>
    </div>
    <div class="content" id="content">
      <div id="chatView"></div>
      <div id="recapView" style="display:none"></div>
      <div id="chartView" style="display:none"></div>
      <div id="recurringView" style="display:none"></div>
    </div>
    <div class="input-bar">
      <input type="file" id="receiptInput" accept="image/*" capture="environment" style="display:none" onchange="handleReceipt(this)">
      <button class="cam-btn" id="camBtn" onclick="document.getElementById('receiptInput').click()">📷</button>
      <input type="text" id="msgInput" placeholder='e.g. "makan 35rb" atau "gaji 5jt"' autocomplete="off">
      <button class="send-btn" onclick="handleSend()">↑</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
<script>
// ═══════════════════════════════════════════════
// FIREBASE — config kamu yang benar
// ═══════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyCsIJFMXUFvuBYYnIMP9H_1wyxi6j3SITE",
  authDomain:"cashchat-f483a.firebaseapp.com",
  projectId:"cashchat-f483a",
  storageBucket:"cashchat-f483a.firebasestorage.app",
  messagingSenderId:"1071835151757",
  appId:"1:1071835151757:web:49f6475503b51a8cc191c4"
});
const auth=firebase.auth();
const db=firebase.firestore();
const googleProvider=new firebase.auth.GoogleAuthProvider();

let currentUser=null;
let entries=[];
let messages=[];
let GEMINI_KEY=localStorage.getItem('cashchat_gemini')||'';
let unsubEntries=null,unsubMessages=null,unsubRecurring=null;
let recurring=[];

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
let isRegister=false;
document.getElementById('googleBtn').onclick=async()=>{try{await auth.signInWithPopup(googleProvider)}catch(e){showAuthErr(e.message)}};
document.getElementById('authSubmit').onclick=async()=>{
  const em=document.getElementById('authEmail').value,pw=document.getElementById('authPass').value;
  if(!em||!pw)return showAuthErr('Isi email dan password');
  try{if(isRegister)await auth.createUserWithEmailAndPassword(em,pw);else await auth.signInWithEmailAndPassword(em,pw);}
  catch(e){showAuthErr(e.code==='auth/user-not-found'?'Email tidak ditemukan':e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'?'Password salah':e.code==='auth/email-already-in-use'?'Email sudah terdaftar':e.code==='auth/weak-password'?'Password minimal 6 karakter':e.message);}
};
document.getElementById('authToggleBtn').onclick=()=>{isRegister=!isRegister;document.getElementById('authSubmit').textContent=isRegister?'Daftar':'Login';document.getElementById('authToggleText').textContent=isRegister?'Udah punya akun?':'Belum punya akun?';document.getElementById('authToggleBtn').textContent=isRegister?'Login':'Daftar';document.getElementById('authError').style.display='none';};
function showAuthErr(m){const el=document.getElementById('authError');el.textContent=m;el.style.display='block';}
function doLogout(){if(unsubEntries)unsubEntries();if(unsubMessages)unsubMessages();if(unsubRecurring)unsubRecurring();auth.signOut();}

auth.onAuthStateChanged(user=>{
  document.getElementById('loadingScreen').style.display='none';
  if(user){
    currentUser=user;
    document.getElementById('authScreen').style.display='none';
    document.getElementById('mainApp').style.display='flex';
    document.getElementById('mainApp').style.flexDirection='column';
    document.getElementById('mainApp').style.flex='1';
    document.getElementById('userName').textContent=user.displayName||user.email;
    startSync();
  }else{
    currentUser=null;entries=[];messages=[];
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('mainApp').style.display='none';
  }
});

// ═══════════════════════════════════════════════
// FIRESTORE SYNC — entries + messages both in Firebase
// ═══════════════════════════════════════════════
function startSync(){
  // Entries (transactions)
  if(unsubEntries)unsubEntries();
  unsubEntries=db.collection('users').doc(currentUser.uid).collection('entries').orderBy('createdAt','desc')
    .onSnapshot(snap=>{
      entries=snap.docs.map(d=>{const data=d.data();return{id:d.id,...data,amount:Number(data.amount),date:data.date||data.createdAt?.toDate?.()?.toISOString()||new Date().toISOString()};});
      updateUI();
    });
  // Chat messages (synced across devices!)
  if(unsubMessages)unsubMessages();
  unsubMessages=db.collection('users').doc(currentUser.uid).collection('messages').orderBy('ts','asc')
    .onSnapshot(snap=>{
      messages=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderChat();
    });
  // Recurring items
  if(unsubRecurring)unsubRecurring();
  unsubRecurring=db.collection('users').doc(currentUser.uid).collection('recurring').orderBy('description')
    .onSnapshot(snap=>{
      recurring=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderRecurring();
      checkRecurring();
    });
}
async function addEntry(entry){
  await db.collection('users').doc(currentUser.uid).collection('entries').add({...entry,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
}
async function deleteEntry(id){
  await db.collection('users').doc(currentUser.uid).collection('entries').doc(id).delete();
}
async function addMsg(msg){
  await db.collection('users').doc(currentUser.uid).collection('messages').add({...msg,ts:firebase.firestore.FieldValue.serverTimestamp()});
}

// ═══════════════════════════════════════════════
// CATEGORIES + PARSING
// ═══════════════════════════════════════════════
const EC={"🍔 Makan":["makan","lunch","dinner","breakfast","sarapan","nasi","ayam","sate","bakso","mie","burger","pizza","sushi","ramen","warteg","padang","resto","restaurant","food","snack","jajan","indomie","geprek","pecel","gado","soto","rawon","rendang","martabak","gorengan","seblak","batagor","siomay","nasi goreng","ketoprak","bubur","pempek","dimsum","steak","salad","ricebowl","lauk","sayur","catering","mcd","kfc","hokben","solaria","yoshinoya"],"☕ Ngopi & Minum":["kopi","coffee","starbucks","boba","teh","tea","minum","drink","jus","juice","es","susu","milk","chatime","kenangan","janji jiwa","fore","tomoro","mixue","yakult","jco"],"🍞 Roti & Snack":["roti","bread","bakery","kue","cake","donat","croissant","pastry","cookies","keripik","coklat","permen","ice cream","es krim","breadtalk"],"🛒 Groceries":["supermarket","super indo","hypermart","giant","alfamart","indomaret","lotte mart","lotte","family mart","familymart","lawson","circle k","groceries","belanja bulanan","sayuran","buah","daging","bumbu","beras","minyak","telur","ranch market","farmers market","transmart","food hall"],"🚗 Transport":["grab","gojek","ojek","taxi","taksi","uber","bensin","parkir","tol","transport","bus","kereta","mrt","lrt","krl","transjakarta","angkot","ojol","maxim","indriver","solar","pertalite","pertamax","shell","bbm","e-toll","etoll","flazz"],"🛍️ Belanja":["beli","belanja","shopping","baju","celana","sepatu","tas","tokped","tokopedia","shopee","lazada","blibli","mall","tiktok shop","fashion","kaos","jaket"],"🏠 Rumah & Tagihan":["listrik","air","pam","wifi","internet","pulsa","paket data","iuran","sewa","rent","kost","kos","bill","tagihan","indihome","telkomsel","xl","tri","smartfren","pln","bpjs","asuransi","cicilan","kredit","angsuran","pajak","gas","elpiji","laundry","cuci"],"🎮 Hiburan":["game","netflix","spotify","youtube","nonton","bioskop","cinema","tiket","konser","hiburan","disney","hbo","steam","topup","cgv","xxi"],"⚽ Olahraga":["futsal","gym","fitness","badminton","renang","swimming","tennis","basket","yoga","pilates","golf","boxing","membership"],"💊 Kesehatan":["obat","dokter","apotek","rumah sakit","rs","klinik","vitamin","health","medical","checkup","lab","gigi","dentist"],"📚 Pendidikan":["buku","book","kursus","course","les","tutor","sekolah","kuliah","udemy","seminar","workshop","training"],"🧴 Self Care":["skincare","makeup","salon","barbershop","barber","potong rambut","cukur","spa","pijat","massage"],"🎁 Gift & Donasi":["kado","gift","hadiah","donasi","infaq","sedekah","zakat","amal","charity","angpao"],"📦 Lainnya":[]};
const IC={"💰 Gaji":["gaji","salary","payroll","gajian","upah"],"💵 Bonus & Komisi":["komisi","commission","bonus","insentif","thr","lembur","overtime"],"💼 Freelance":["freelance","project","proyek","jasa","fee","honor","honorarium"],"🏪 Jualan":["jualan","jual","profit","laba","untung","omset","penjualan"],"🎁 Transfer Masuk":["transfer","terima","tf","kiriman"],"📈 Investasi":["dividen","dividend","bunga","interest","investasi","saham","crypto","reksadana","deposito"],"💳 Cashback & Refund":["refund","cashback","rebate","voucher","reward","poin"],"💚 Income Lain":[]};
const ST={"Alfamart":["alfamart","alfa"],"Indomaret":["indomaret","indomart"],"Lotte Mart":["lotte mart","lotte"],"Family Mart":["family mart","familymart"],"Starbucks":["starbucks"],"Kopi Kenangan":["kenangan"],"Janji Jiwa":["janji jiwa"],"Fore Coffee":["fore"],"Tomoro":["tomoro"],"Mixue":["mixue"],"McDonald's":["mcd","mcdonalds"],"KFC":["kfc"],"Grab":["grab","grabfood","grabbike"],"Gojek":["gojek","gofood","goride"],"Tokopedia":["tokped","tokopedia"],"Shopee":["shopee"]};
const IW=["gaji","gajian","salary","payroll","upah","komisi","commission","bonus","thr","lembur","overtime","freelance","honor","dividen","dividend","bunga deposito","cashback","refund","income","pemasukan","insentif","transfer masuk","profit","laba","untung"];
const EW=["beli","bayar","bayarin","traktir","ongkir","ongkos","biaya","harga","buat","untuk"];

function categ(t,tp){const l=t.toLowerCase();const c=tp==='income'?IC:EC;for(const[k,ws]of Object.entries(c))if(ws.some(w=>l.includes(w)))return k;return tp==='income'?"💚 Income Lain":"📦 Lainnya";}
function detectStore(t){const l=t.toLowerCase();for(const[s,ws]of Object.entries(ST))if(ws.some(w=>l.includes(w)))return s;return'';}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const d=Array.from({length:m+1},(_,i)=>i);for(let j=1;j<=n;j++){let p=d[0];d[0]=j;for(let i=1;i<=m;i++){const t=d[i];d[i]=a[i-1]===b[j-1]?p:1+Math.min(p,d[i],d[i-1]);p=t;}}return d[m];}
const DICT=(()=>{const w=new Set();[EC,IC].forEach(c=>Object.values(c).forEach(ks=>ks.forEach(k=>{k.split(' ').forEach(x=>{if(x.length>=3)w.add(x)});if(k.includes(' '))w.add(k)})));Object.keys(ST).forEach(s=>w.add(s.toLowerCase()));Object.values(ST).forEach(ks=>ks.forEach(k=>{if(k.length>=3)w.add(k)}));IW.forEach(x=>w.add(x));EW.forEach(x=>w.add(x));return[...w]})();
function correctTypos(text){const words=text.split(/\s+/);const corr=[];const fixed=words.map(w=>{const l=w.toLowerCase();if(w.match(/\d/)||l.length<3||DICT.includes(l))return w;let best=null,bd=9;for(const k of DICT){if(Math.abs(k.length-l.length)>2)continue;const d=lev(l,k);const th=l.length<=4?1:2;if(d<=th&&d<bd){bd=d;best=k;}}if(best&&best!==l){const f=w[0]===w[0].toUpperCase()?best[0].toUpperCase()+best.slice(1):best;corr.push({from:w,to:f});return f;}return w;});return{text:fixed.join(' '),corrections:corr};}
function parseAmount(t){const l=t.toLowerCase().replace(/\./g,'').replace(/,/g,'');const ps=[{r:/(\d+(?:[.,]\d+)?)\s*jt/i,m:1e6},{r:/(\d+(?:[.,]\d+)?)\s*juta/i,m:1e6},{r:/(\d+(?:[.,]\d+)?)\s*rb/i,m:1e3},{r:/(\d+(?:[.,]\d+)?)\s*ribu/i,m:1e3},{r:/(\d+(?:[.,]\d+)?)\s*k\b/i,m:1e3},{r:/rp\s*(\d+)/i,m:1},{r:/(\d{4,})/,m:1}];for(const{r,m}of ps){const match=l.match(r);if(match)return Math.round(parseFloat(match[1].replace(',','.'))*m);}return null;}
function parseMessage(text){
  const{text:ct,corrections:corr}=correctTypos(text);const wt=corr.length>0?ct:text;
  const l=wt.toLowerCase();const hp=text.startsWith('+'),hm=text.startsWith('-');
  const he=EW.some(k=>l.includes(k)),hi=IW.some(k=>l.includes(k));
  let isInc;if(hp)isInc=true;else if(hm)isInc=false;else if(he&&!hi)isInc=false;else if(hi&&!he)isInc=true;else isInc=false;
  const clean=(hp||hm)?wt.slice(1).trim():wt;const amount=parseAmount(clean);if(!amount)return null;
  const type=isInc?'income':'expense';let store=detectStore(clean),descText=clean;
  const pm=clean.match(/\b(?:di|du|d\/|at|ke)\s+(.+?)(?:\s+\d|\s*$)/i);
  if(pm&&!store){const pn=pm[1].replace(/\d+.*$/,'').replace(/\s*(rb|ribu|jt|juta|k)\b.*$/i,'').trim();if(pn.length>=2){store=pn;descText=clean.replace(/\b(?:di|du|d\/|at|ke)\s+.+?(?=\s+\d|\s*$)/i,'').trim();}}
  const category=categ(descText,type);
  let desc=descText.replace(/rp\s*\d+/gi,'').replace(/\d+(?:[.,]\d+)?\s*(jt|juta|rb|ribu|k)\b/gi,'').replace(/\d{4,}/g,'').replace(/\s+/g,' ').trim();
  desc=desc.replace(/\bmlm\b/gi,'malam').replace(/\bpg\b/gi,'pagi').replace(/\bsng\b/gi,'siang').replace(/\bsor\b/gi,'sore');
  if(!desc)desc=category.split(' ').slice(1).join(' ');
  return{amount,category,description:desc,type,store,date:new Date().toISOString(),corrections:corr.length>0?corr:null};
}
function fmtRp(n){return'Rp'+Math.abs(n).toLocaleString('id-ID')}
function fmtDate(iso){return new Date(iso).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}
function fmtTime(iso){return new Date(iso).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function addRecurringItem(){
  const d=document.getElementById('recDesc').value.trim();
  const a=parseAmount(document.getElementById('recAmt').value);
  const day=parseInt(document.getElementById('recDay').value);
  const type=document.getElementById('recType').value;
  if(!d||!a||!day||day<1||day>31)return;
  await db.collection('users').doc(currentUser.uid).collection('recurring').add({description:d,amount:a,day,category:categ(d,type),type,store:detectStore(d),lastRun:''});
  document.getElementById('recDesc').value='';document.getElementById('recAmt').value='';
}
async function removeRecurring(id){
  await db.collection('users').doc(currentUser.uid).collection('recurring').doc(id).delete();
}
async function checkRecurring(){
  const today=new Date();const day=today.getDate();const mk=today.toISOString().slice(0,7);
  for(const r of recurring){
    if(r.day===day&&r.lastRun!==mk){
      const entry={amount:r.amount,category:r.category,description:r.description,type:r.type||'expense',store:r.store||'',date:today.toISOString()};
      await addEntry(entry);
      await addMsg({role:'user',text:`🔄 Auto: ${r.description} ${fmtRp(r.amount)}`});
      await addMsg({role:'bot',parsed:entry});
      await db.collection('users').doc(currentUser.uid).collection('recurring').doc(r.id).update({lastRun:mk});
    }
  }
}
function renderRecurring(){
  let h=`<div class="rec-panel"><div class="rec-title">🔄 Tagihan & Pengeluaran Rutin</div><p style="font-size:12px;color:var(--text2);margin-bottom:12px">Otomatis dicatat tiap bulan pada tanggal tertentu.</p>`;
  if(recurring.length===0)h+=`<p style="font-size:13px;color:var(--text2);text-align:center;padding:16px">Belum ada tagihan rutin</p>`;
  else recurring.forEach(r=>{const isIn=r.type==='income';
    h+=`<div class="rec-item"><div style="font-size:22px">${(r.category||'📦').split(' ')[0]}</div><div class="rec-info"><div class="rec-desc">${esc(r.description)} <span class="recurring-badge">Tgl ${r.day}</span></div><div class="rec-meta">${r.category||''}${r.store?' · 🏪 '+r.store:''} · ${isIn?'Pemasukan':'Pengeluaran'}</div></div><div class="rec-amt" style="color:${isIn?'var(--green)':'var(--red)'}">${isIn?'+':'−'}${fmtRp(r.amount)}</div><button class="del-btn" onclick="removeRecurring('${r.id}')">×</button></div>`;});
  h+=`<div class="rec-add"><input id="recDesc" placeholder="Nama (WiFi, Gaji...)"><input id="recAmt" placeholder="Jumlah (350rb)"><select id="recDay">${Array.from({length:31},(_,i)=>`<option value="${i+1}">Tgl ${i+1}</option>`).join('')}</select><select id="recType"><option value="expense">Keluar</option><option value="income">Masuk</option></select><button onclick="addRecurringItem()">+ Tambah</button></div></div>`;
  document.getElementById('recurringView').innerHTML=h;
}

let currentTab='chat',recapPeriod='daily',filterFrom='',filterTo='';
function switchTab(tab,btn){currentTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');['chatView','recapView','chartView','recurringView'].forEach(v=>document.getElementById(v).style.display='none');document.getElementById(tab+'View').style.display='';updateUI();}
function getBal(list){let i=0,e=0;list.forEach(x=>{if(x.type==='income')i+=x.amount;else e+=x.amount});return{inc:i,exp:e,bal:i-e};}
function updateUI(){const{bal}=getBal(entries);const el=document.getElementById('balAmt');el.textContent=(bal>=0?'+':'−')+fmtRp(Math.abs(bal));el.className='amount '+(bal>=0?'pos':'neg');renderChat();renderRecap();renderChart();renderRecurring();}

function renderChat(){
  const c=document.getElementById('chatView');
  if(messages.length===0){c.innerHTML=`<div class="empty-state"><div class="icon">💬</div><div class="etitle">Halo ${esc(currentUser?.displayName?.split(' ')[0]||'')}!</div><div class="hints"><strong>Pengeluaran:</strong> "makan siang 35rb"<br><strong>Pemasukan:</strong> "gaji 5jt"<br><strong>📷 Scan Struk:</strong> Klik kamera</div></div>`;return;}
  let html='';
  messages.forEach(m=>{
    if(m.role==='user'){html+=`<div class="bubble-row user"><div class="bubble ub">${esc(m.text||'')}</div></div>`;}
    else if(m.ocrError){html+=`<div class="bubble-row bot"><div class="bubble bb">❌ ${esc(m.ocrError)}</div></div>`;}
    else if(m.isOcr&&m.parsed){const p=m.parsed;let ih='';if(p.ocrItems)p.ocrItems.forEach(i=>{ih+=`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0"><span>${esc(i.item)}</span><span style="opacity:.6">${fmtRp(i.amount||0)}</span></div>`;});
      html+=`<div class="bubble-row bot"><div class="bubble bb"><div class="ok">🧾 Struk di-scan!</div>${p.store?`<div class="store-tag">🏪 ${esc(p.store)}</div>`:''}<div style="margin:6px 0;padding:8px;background:var(--surface2);border-radius:8px">${ih}</div><div class="dg"><span class="lbl">Total Bayar</span><span class="amt-out">−${fmtRp(p.amount)}</span></div></div></div>`;}
    else if(m.parsed){const p=m.parsed,isIn=p.type==='income';let corrH='';if(p.corrections)corrH=`<div style="font-size:11px;color:var(--yellow);margin-top:4px;opacity:.8">✏️ ${p.corrections.map(c=>'<s style="opacity:.5">'+esc(c.from)+'</s> → '+esc(c.to)).join(', ')}</div>`;
      html+=`<div class="bubble-row bot"><div class="bubble bb"><div class="ok">${isIn?'💰 Pemasukan dicatat!':'✅ Dicatat!'}</div><div class="dg"><span class="lbl">Item</span><span>${esc(p.description)}</span><span class="lbl">Jumlah</span><span class="${isIn?'amt-in':'amt-out'}">${isIn?'+':'−'}${fmtRp(p.amount)}</span><span class="lbl">Kategori</span><span>${esc(p.category)}</span>${p.store?`<span class="lbl">Tempat</span><span>🏪 ${esc(p.store)}</span>`:''}</div>${corrH}</div></div>`;}
    else if(m.role==='bot'){html+=`<div class="bubble-row bot"><div class="bubble bb"><div>🤔 Ga bisa baca jumlahnya.</div><div style="font-size:12px;opacity:.55;margin-top:3px">Format: "makan 35rb" atau "gaji 5jt"</div></div></div>`;}
  });
  c.innerHTML=html;c.parentElement.scrollTop=c.parentElement.scrollHeight;
}

function getFiltered(){let f=entries;if(recapPeriod==='daily'){const t=new Date().toISOString().slice(0,10);f=entries.filter(e=>e.date?.slice(0,10)===t);}else if(recapPeriod==='monthly'){const m=new Date().toISOString().slice(0,7);f=entries.filter(e=>e.date?.slice(0,7)===m);}else if(recapPeriod==='custom'){if(filterFrom)f=f.filter(e=>e.date?.slice(0,10)>=filterFrom);if(filterTo)f=f.filter(e=>e.date?.slice(0,10)<=filterTo);}return f;}
function renderRecap(){
  const fl=getFiltered();const{inc,exp,bal}=getBal(fl);const pL=recapPeriod==='daily'?'Hari Ini':recapPeriod==='monthly'?'Bulan Ini':'Custom';
  let h=`<div class="recap-controls"><button class="pill ${recapPeriod==='daily'?'active':''}" onclick="setRP('daily')">Hari Ini</button><button class="pill ${recapPeriod==='monthly'?'active':''}" onclick="setRP('monthly')">Bulan Ini</button><button class="pill ${recapPeriod==='custom'?'active':''}" onclick="setRP('custom')">📅 Custom</button><button class="pill outline" onclick="exportCSV()">📥 Export</button></div>`;
  if(recapPeriod==='custom')h+=`<div class="date-filter"><input type="date" value="${filterFrom}" onchange="filterFrom=this.value;renderRecap()"><span style="color:var(--text2);font-size:12px">→</span><input type="date" value="${filterTo}" onchange="filterTo=this.value;renderRecap()"></div>`;
  h+=`<div class="summary-row"><div class="scard" style="background:rgba(81,207,102,.08)"><div class="sl">Masuk</div><div class="sv" style="color:var(--green)">+${fmtRp(inc)}</div></div><div class="scard" style="background:rgba(255,107,107,.08)"><div class="sl">Keluar</div><div class="sv" style="color:var(--red)">−${fmtRp(exp)}</div></div></div>`;
  h+=`<div class="scard" style="background:rgba(108,92,231,.1);margin-bottom:16px"><div class="sl">Saldo ${pL}</div><div class="sv" style="color:${bal>=0?'var(--green)':'var(--red)'}">${bal>=0?'+':'−'}${fmtRp(Math.abs(bal))}</div><div class="ss">${fl.length} transaksi</div></div>`;
  if(fl.length===0)h+=`<div class="empty-state" style="padding:24px"><div class="icon">🎉</div><div class="etitle" style="font-size:14px">Belum ada transaksi</div></div>`;
  else fl.forEach(e=>{const isIn=e.type==='income';const st=e.store?' · 🏪 '+e.store:'';h+=`<div class="tx-item"><div style="font-size:22px">${(e.category||'📦').split(' ')[0]}</div><div class="info"><div class="desc">${esc(e.description||'')}</div><div class="meta">${fmtDate(e.date)} · ${fmtTime(e.date)}${st}</div></div><div class="price" style="color:${isIn?'var(--green)':'var(--red)'}">${isIn?'+':'−'}${fmtRp(e.amount)}</div><button class="del-btn" onclick="deleteEntry('${e.id}')">×</button></div>`;});
  document.getElementById('recapView').innerHTML=h;
}
function setRP(p){recapPeriod=p;renderRecap();}
function renderChart(){
  if(entries.length===0){document.getElementById('chartView').innerHTML=`<div class="empty-state" style="padding:40px"><div class="icon">📊</div><div class="etitle" style="font-size:14px">Belum ada data</div></div>`;return;}
  const byCat={};entries.filter(e=>e.type!=='income').forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount});const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);const max=sorted[0]?sorted[0][1]:1;
  let h=`<div class="ct">Pengeluaran by Category</div>`;sorted.forEach(([c,a])=>{h+=`<div class="bar-row"><div class="bar-label"><span>${c}</span><span class="val">${fmtRp(a)}</span></div><div class="bar-track"><div class="bar-fill out" style="width:${(a/max)*100}%"></div></div></div>`;});
  const byStore={};entries.filter(e=>e.type!=='income'&&e.store).forEach(e=>{byStore[e.store]=(byStore[e.store]||0)+e.amount});const sS=Object.entries(byStore).sort((a,b)=>b[1]-a[1]);
  if(sS.length>0){const mS=sS[0][1];h+=`<div class="ct" style="margin-top:24px">🏪 By Tempat</div>`;sS.forEach(([s,a])=>{h+=`<div class="bar-row"><div class="bar-label"><span>${s}</span><span class="val">${fmtRp(a)}</span></div><div class="bar-track"><div class="bar-fill out" style="width:${(a/mS)*100}%"></div></div></div>`;});}
  const byCatIn={};entries.filter(e=>e.type==='income').forEach(e=>{byCatIn[e.category]=(byCatIn[e.category]||0)+e.amount});const sI=Object.entries(byCatIn).sort((a,b)=>b[1]-a[1]);
  if(sI.length>0){const mI=sI[0][1];h+=`<div class="ct" style="margin-top:24px">Pemasukan by Category</div>`;sI.forEach(([c,a])=>{h+=`<div class="bar-row"><div class="bar-label"><span>${c}</span><span class="val">${fmtRp(a)}</span></div><div class="bar-track"><div class="bar-fill in" style="width:${(a/mI)*100}%"></div></div></div>`;});}
  document.getElementById('chartView').innerHTML=h;
}

async function handleSend(){
  const input=document.getElementById('msgInput');const text=input.value.trim();if(!text)return;input.value='';
  if(text==='/reset'){const batch=db.batch();const snap=await db.collection('users').doc(currentUser.uid).collection('messages').get();snap.forEach(d=>batch.delete(d.ref));await batch.commit();return;}
  // Save user message to Firebase
  await addMsg({role:'user',text});
  const parsed=parseMessage(text);
  if(parsed){
    await addEntry(parsed);
    await addMsg({role:'bot',parsed});
  }else{
    await addMsg({role:'bot',parsed:null});
  }
}

async function handleReceipt(fi){
  const file=fi.files[0];if(!file)return;fi.value='';
  if(!GEMINI_KEY){const k=prompt('Masukkan Gemini API Key:\n(Gratis dari aistudio.google.com → Get API Key)');if(!k)return;GEMINI_KEY=k;localStorage.setItem('cashchat_gemini',k);}
  const btn=document.getElementById('camBtn');btn.classList.add('processing');btn.textContent='⏳';
  const b64=await new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(',')[1]);rd.readAsDataURL(file);});
  await addMsg({role:'user',text:'📷 Scan struk...'});
  try{
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:`Kamu adalah OCR struk belanja. OUTPUT HANYA JSON:
{"store":"nama toko","items":[{"item":"nama","amount":harga}],"total_paid":angka}
RULES: total_paid=total akhir dibayar (setelah diskon+pajak). Kalau ada Tunai & Kembalian: total_paid=Tunai-Kembalian. JANGAN masukkan subtotal/diskon/pajak sebagai item.`},{inline_data:{mime_type:file.type||'image/jpeg',data:b64}}]}]})});
    const data=await resp.json();if(!resp.ok)throw new Error(data.error?.message||'API error');
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';if(!text)throw new Error('No response');
    const result=JSON.parse(text.replace(/```json?\s*/g,'').replace(/```/g,'').trim());
    const items=result.items||[];const totalPaid=result.total_paid||0;const storeName=result.store||'';
    if(items.length===0){await addMsg({role:'bot',ocrError:'Ga bisa baca struk.'});}
    else{
      const finalAmt=totalPaid>0?Math.round(totalPaid):items.reduce((s,i)=>s+(i.amount||0),0);
      const desc=storeName?`Belanja di ${storeName}`:`Belanja ${items.length} item`;
      const entry={amount:finalAmt,category:categ(items[0]?.item||'','expense'),description:desc,type:'expense',store:storeName||detectStore(items[0]?.item||''),date:new Date().toISOString()};
      await addEntry(entry);
      await addMsg({role:'bot',parsed:{...entry,ocrItems:items,totalPaid},isOcr:true});}
  }catch(err){console.error(err);await addMsg({role:'bot',ocrError:'Error: '+err.message});}
  finally{btn.classList.remove('processing');btn.textContent='📷';}
}

function exportCSV(){const fl=getFiltered();let csv='Date,Time,Type,Description,Category,Store,Amount\n';fl.forEach(e=>{csv+=`${fmtDate(e.date)},${fmtTime(e.date)},${e.type||'expense'},"${e.description||''}","${e.category||''}","${e.store||''}",${e.type==='income'?'':'-'}${e.amount}\n`;});const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`cashchat-${new Date().toISOString().slice(0,10)}.csv`;a.click();}

document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleSend()});
